name: Daily Surah Release

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC = 8pm SF time
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run release script
        run: node scripts/release-today.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "quranmemo-bot"
          git config user.email "bot@quranmemo.app"
          git add .
          git commit -m "$(cat .release-message)"
          git push
