<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

    <!-- App name & SEO -->
    <title>Quran Memorization — Learn Surah by Surah</title>
    <meta name="description" content="Memorize the Quran surah by surah — Arabic text, syllable-by-syllable transliteration, audio recitation, and progress tracking. Built for new Muslims and non-Arabic speakers." />
    <meta name="keywords" content="Quran memorization, learn Quran, transliteration, new Muslim, Islam, hifz" />
    <meta name="author" content="Quran Memorization App" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph (WhatsApp, Facebook, iMessage previews) -->
    <meta property="og:title" content="Quran Memorization — Learn Surah by Surah" />
    <meta property="og:description" content="Learn to recite the Quran with transliteration, audio, and progress tracking. For new Muslims and non-Arabic speakers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quranmemo.app" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Quran Memorization" />
    <meta name="twitter:description" content="Learn to recite the Quran surah by surah — transliteration, audio, progress tracking." />

    <!-- PWA basics (mobile app readiness) -->
    <meta name="theme-color" content="#06101c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quran Memo" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <!-- Base mobile styles -->
    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; background: #06101c; overscroll-behavior: none; }
      input, button, select { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
